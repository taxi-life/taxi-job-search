<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あなたに合う求人が見つかりました</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #1DB954;
      --dark-green: #158a3e;
      --orange: #FF6B2B;
      --navy: #1a2744;
      --bg: #f4f6fb;
      --card-bg: #ffffff;
      --text: #1a2744;
      --sub: #6b7a99;
      --border: #e4e8f0;
      --badge-go: #e8f5e9;
      --badge-go-text: #2e7d32;
      --badge-cost: #fff3e0;
      --badge-cost-text: #e65100;
      --badge-area: #e3f2fd;
      --badge-area-text: #1565c0;
      --badge-app: #f3e5f5;
      --badge-app-text: #6a1b9a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ヘッダー */
    .header {
      background: var(--navy);
      color: #fff;
      padding: 16px 20px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-back {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }

    .header-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .header-tag {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: #fff;
    }

    /* 件数バー */
    .count-bar {
      padding: 12px 20px;
      font-size: 13px;
      color: var(--sub);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .count-bar span {
      font-weight: 700;
      color: var(--orange);
      font-size: 16px;
    }

    /* カードリスト */
    .card-list {
      padding: 12px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(26,39,68,0.07);
      position: relative;
      animation: fadeUp 0.4s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }
    .card:nth-child(5) { animation-delay: 0.33s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-recommend {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--orange);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      padding-right: 60px;
      line-height: 1.4;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .badge-area  { background: var(--badge-area);  color: var(--badge-area-text); }
    .badge-cost  { background: var(--badge-cost);  color: var(--badge-cost-text); }
    .badge-go    { background: var(--badge-go);    color: var(--badge-go-text); }
    .badge-app   { background: var(--badge-app);   color: var(--badge-app-text); }
    .badge-yado  { background: #fce4ec; color: #880e4f; }

    .card-meta {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 14px;
      line-height: 1.8;
    }

    .card-meta strong {
      color: var(--text);
      font-weight: 500;
    }

    .card-btns {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 11px 0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      text-align: center;
    }

    .btn-detail {
      background: #fff;
      color: var(--navy);
      border: 1.5px solid var(--border);
    }

    .btn-apply {
      background: var(--orange);
      color: #fff;
    }

    /* 結果なし */
    .no-result {
      text-align: center;
      padding: 60px 20px;
      display: none;
    }

    .no-result-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .no-result-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .no-result-sub {
      font-size: 14px;
      color: var(--sub);
    }

    /* ローディング */
    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-back">← 条件を変更する</div>
  <div class="header-title">あなたに合う求人が<br>見つかりました</div>
  <div class="header-tags" id="conditionTags"></div>
</div>

<!-- 件数バー -->
<div class="count-bar" id="countBar">
  <span id="countNum">-</span>件の企業が見つかりました
</div>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--sub)">求人情報を取得中...</div>
</div>

<!-- カードリスト -->
<div class="card-list" id="cardList"></div>

<!-- 結果なし -->
<div class="no-result" id="noResult">
  <div class="no-result-icon">🔍</div>
  <div class="no-result-title">該当する求人が見つかりませんでした</div>
  <div class="no-result-sub">条件を変更して再度お試しください</div>
</div>

<script>
  // URLパラメータを取得
  const params = new URLSearchParams(location.search);
  const area   = params.get('area')   || '';
  const age    = params.get('age')    || '';
  const license = params.get('license') || '';

  // 条件タグ表示
  const tagsEl = document.getElementById('conditionTags');
  [area, age, license].filter(Boolean).forEach(t => {
    const el = document.createElement('span');
    el.className = 'header-tag';
    el.textContent = t;
    tagsEl.appendChild(el);
  });

  // Google Sheets公開CSV URL（企業情報シート）
  // ★ 実際のシートIDに変更してください
  const SHEET_ID  = 'YOUR_SHEET_ID';
  const SHEET_GID = '0'; // 企業情報シートのgid
  const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;

  // CSV取得・パース
  fetch(CSV_URL)
    .then(r => r.text())
    .then(csv => {
      const rows = parseCSV(csv);
      const headers = rows[0];
      const data = rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (r[i] || '').trim());
        return obj;
      });

      // エリア絞り込み
      const filtered = area
        ? data.filter(d => d['エリア'] && d['エリア'].includes(area))
        : data;

      document.getElementById('loading').style.display = 'none';

      if (filtered.length === 0) {
        document.getElementById('noResult').style.display = 'block';
        document.getElementById('countNum').textContent = '0';
        return;
      }

      document.getElementById('countNum').textContent = filtered.length;
      renderCards(filtered);
    })
    .catch(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('noResult').style.display = 'block';
    });

  function renderCards(companies) {
    const list = document.getElementById('cardList');
    companies.forEach((c, i) => {
      const badges = [];
      if (c['エリア'])      badges.push(`<span class="badge badge-area">📍 ${c['エリア']}</span>`);
      if (c['交通費支給'] === 'あり') badges.push(`<span class="badge badge-cost">🚃 交通費支給あり</span>`);
      if (c['GO対応'] === '〇')  badges.push(`<span class="badge badge-go">GO対応</span>`);
      if (c['S.RIDE対応'] === '〇') badges.push(`<span class="badge badge-app">S.RIDE対応</span>`);
      if (c['DiDi対応'] === '〇')  badges.push(`<span class="badge badge-app">DiDi対応</span>`);
      if (c['寮あり'] === 'あり')  badges.push(`<span class="badge badge-yado">寮あり</span>`);
      if (c['寮なし'] === '寮なし') badges.push(`<span class="badge badge-yado">寮なし</span>`);

      const recommend = i === 0 ? '<span class="card-recommend">おすすめ</span>' : '';

      list.innerHTML += `
        <div class="card">
          ${recommend}
          <div class="card-name">${c['企業名（B）'] || c['企業名'] || '企業名未設定'}</div>
          <div class="badge-row">${badges.join('')}</div>
          <div class="card-meta">
            ◉ 新人用車種：<strong>${c['新人用車種（J）'] || c['新人用車種'] || '-'}</strong>　
            対象年齢上限：<strong>${c['対象年齢上限（K）'] || c['対象年齢上限'] || '-'}歳</strong>
          </div>
          <div class="card-btns">
            <button class="btn btn-detail" onclick="alert('詳細ページは準備中です')">詳細を見る</button>
            <button class="btn btn-apply" onclick="alert('応募ページは準備中です')">応募する</button>
          </div>
        </div>
      `;
    });
  }

  // シンプルなCSVパーサー
  function parseCSV(text) {
    const rows = [];
    let row = [], cur = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
      else if ((c === '\n' || c === '\r') && !inQ) {
        row.push(cur); cur = '';
        if (row.some(Boolean)) rows.push(row);
        row = [];
        if (text[i+1] === '\n') i++;
      } else { cur += c; }
    }
    if (cur || row.length) { row.push(cur); rows.push(row); }
    return rows;
  }
</script>
</body>
</html>
